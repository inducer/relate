{% extends "course/course-base-with-markup.html" %}
{% load i18n %}

{% load crispy_forms_tags %}
{% load static %}

{% block content %}
  <h1>{% trans "Markup Sandbox" %}</h1>
  {% if preview_text %}
  <div class="relate-well">
    <div style="max-height:700px; overflow-y:scroll">
      {{ preview_text|safe }}
    </div>
  </div>
  {% endif %}
  <div class="relate-well">
    {% crispy form %}
  </div>

  {# {{{ paste from clipboard #}

  <script type="text/javascript">
    (function() {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        return;
      }
      const previewBtn = document.getElementById('submit-id-preview');
      if (!previewBtn) {
        return;
      }
      const pasteBtn = document.createElement('input');
      pasteBtn.type = 'button';
      pasteBtn.className = 'btn btn-secondary ms-1';
      pasteBtn.value = "{% trans 'Paste from clipboard' %}";
      pasteBtn.addEventListener('click', function() {
        navigator.clipboard.readText().then(function(text) {
          const editorDom = document.querySelector('#div_id_content .cm-editor');
          if (!editorDom) { return; }
          const view = rlCodemirror.EditorView.findFromDOM(editorDom);
          if (!view) { return; }
          view.dispatch(view.state.update({
            changes: { from: 0, to: view.state.doc.length, insert: text },
          }));
          previewBtn.click();
        }).catch(function(err) {
          console.error('Failed to read clipboard:', err);
        });
      });
      previewBtn.parentNode.insertBefore(pasteBtn, previewBtn.nextSibling);
    })();
  </script>

  {# }}} #}

{% endblock %}
